<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    <link rel='stylesheet' href='form.css'>
    <link rel='icon' href='formicon.ico' type='image/x-icon'>
</head>

<body>
    <div class='container'>
        <div id='preview' hidden>
            <span>Preview mode</span>
            <button id='edit-btn'>Edit</button>
        </div>
        <form id='basic-form'></form>
        <button id='submit-btn' type='button'>Submit</button>
    </div>
</body>

<script type='module'>
    import FormBuilder from './FormBuilder.js';

    let formObject;
    try {
        formObject = JSON.parse(sessionStorage.formObject);
    }
    catch {
        window.location = '/builder_form.html'
    }

    const parameters = window.location.search.substring(1).split('&');
    if (parameters.includes('preview=true')) {
        const previewElement = document.getElementById('preview');
        previewElement.hidden = false;

        document.getElementById('edit-btn').addEventListener('mousedown', () => {
            sessionStorage.formObject = JSON.stringify(formObject);
            window.location = '/builder_form.html'
        });
    }

    const form_id = 'basic-form';
    if (formObject) {
        const builder = new FormBuilder(document, () => Temporal.Now.plainDateTimeISO());
        builder.build(formObject, form_id);

        document.title = formObject.title;

        document.getElementById('submit-btn').addEventListener('click', () => {
            const form = document.getElementById(form_id);
            const isValid = form.reportValidity();
            if (!isValid) return;

            let formData = builder.getFormData();
            let dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(formData));
            let downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute('href', dataStr);
            downloadAnchorNode.setAttribute('download', `${formObject.id}.answers.json`);
            document.body.appendChild(downloadAnchorNode); // required for firefox
            downloadAnchorNode.click();
        });
    }
</script>

</html>

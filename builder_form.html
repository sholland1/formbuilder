<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    <link rel='stylesheet' href='form.css'>
    <link rel='icon' href='buildicon.ico' type='image/x-icon'>
    <style>
        form#builder-form {
            summary {
                height:2.2em;
                align-content:center;
            }
            details {
                cursor:pointer;
                position:relative;
                .builder-details-buttons {
                    position:absolute;
                    top:-0.1em;
                    right:0.5em;
                }
            }
        }

        #intro {
            text-align: center;
        }

        textarea#prompt {
            height: 20em;
            width: 100%;
            resize: none;
        }

        .wait-cursor { cursor:wait }

        .draggable { cursor: grab }
        .dragging { cursor: grabbing !important }
        .dragging-over { border-bottom: dotted }
        body.dragging details summary * { pointer-events: none }
    </style>
</head>

<body>
    <div class='container'>
        <div id='intro'>
            <h1>Welcome to the Form Builder!</h1>
            <button id='btn-scratch' type='button'>Start Building</button>
            <button id='btn-gen-ai' type='button'>Generate With AI</button>
            <button id='btn-upload' type='button'>Upload Existing Form</button>
        </div>

        <div id='genai' hidden>
            <h1>Generate a form with AI</h1>
            <div id='error-message' hidden></div>
            <div id='prompt-form'>
                <div>
                    <label for='api-key'>OpenAI API key:</label>
                    <input id='api-key' type='password' />
                </div>
                <label for='prompt'>Enter your prompt:</label>
                <textarea id='prompt'></textarea>
                <button id='btn-generate' type='button'>Generate</button>
                <button id='btn-back-from-generate' type='button'>Back</button>
            </div>
            <div id='loading-message' hidden>
                <h2>Generating form...</h2>
            </div>
        </div>

        <div id='builder' hidden>
            <form id='builder-form'>
                <h1 id='builder-title'></h1>
                <details open>
                    <summary>Form Header
                        <div class='builder-details-buttons'>
                            <button id='add_field' type='button'>+ Add field</button>
                            <button id='toggle_sections' type='button'>Expand/Collapse all</button>
                        </div>
                    </summary>
                    <div id='builder-header'></div>
                </details>

                <div id='builder-fields'>
                    <div id='placeholder' style='height:8px'></div>
                </div>
            </form>
            <button id='btn-download' type='button'>Download</button>
            <button id='btn-preview' type='button'>Preview</button>
            <button id='btn-clear' type='button'>Clear</button>
            <button id='btn-back-from-build' type='button'>Back</button>
        </div>
    </div>
</body>

<script type='module'>
    import formObject from './builder.json' with {type: 'json'};
    import FormBuilder from './FormBuilder.js';

    const forms = formObject.forms;
    const builder = new FormBuilder(document, () => Temporal.Now.plainDateTimeISO());
    let system_prompt_text = null;

    let field_index = 0;

    function setVisibility(sectionId) {
        const sectionIds = ['intro', 'builder', 'genai'];
        for (const id of sectionIds) {
            document.getElementById(id).hidden = sectionId !== id;
        }

        const selectors = {
            builder: 'input#id',
            genai: 'textarea#prompt',
        };
        const selector = selectors[sectionId];
        if (selector) {
            requestAnimationFrame(() => document.querySelector(selector).focus());
        }
    }

    function editForm(formObject) {
        const currentTime = Temporal.Now.instant();

        const header = document.getElementById('builder-header');
        header.querySelector('#id').value = formObject.id;
        header.querySelector('#title').value = formObject.title;

        for (const fieldData of formObject.fields) {
            const field_id = addField();

            const current_field = document.getElementById(field_id);

            for (const propName in fieldData) {
                const element = current_field.querySelector(`#${propName}`);
                if (propName === 'required') {
                    element.value = fieldData[propName] !== false ? 'Yes' : 'No';
                }
                else {
                    element.value = fieldData[propName];
                }
                if (propName === 'id') {
                    element.dispatchEvent(new Event('keyup', { bubbles: true }));
                }
                else if (propName === 'type') {
                    element.dispatchEvent(new Event('change', { bubbles: true }));
                }
            }
        }
        setVisibility('builder');

        let diff = Temporal.Now.instant().since(currentTime);
        console.log(diff);
    }

    function clearForm() {
        field_index = 0;
        document.getElementById('builder-header').innerText = '';

        let builderFields = document.getElementById('builder-fields');
        const placeholder = builderFields.firstElementChild;
        builderFields.replaceChildren(placeholder);

        builder.build(forms.header, 'builder-header');
        document.querySelector('input#id').focus();
    }

    document.getElementById('btn-scratch').addEventListener('mousedown', () => setVisibility('builder'));
    document.getElementById('btn-gen-ai').addEventListener('mousedown', () => setVisibility('genai'));
    document.getElementById('btn-upload').addEventListener('mousedown', () => {
        // open file picker to get json file from user
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json,application/json';
        input.addEventListener('change', () => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.addEventListener('load', () => {
                const uploadedForm = JSON.parse(reader.result);
                sessionStorage.formObject = JSON.stringify(uploadedForm);
                clearForm();
                editForm(uploadedForm);
            });
            reader.readAsText(file);
        });
      input.click();
    });

    async function generate_form_json(api_key, prompt) {
        const url = 'https://api.openai.com/v1/chat/completions';

        system_prompt_text = system_prompt_text ?? await load_prompt();

        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${api_key}`,
            },
            body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [
                    { role: 'system', content: system_prompt_text},
                    { role: 'user', content: prompt},
                ],
                temperature: 0.0,
                stream: false,
            }),
        });

        const data = await response.json();
        return JSON.parse(data.choices[0].message.content);
    }

    async function load_prompt() {
        const response = await fetch("prompt.md");
        return await response.text();
    }

    document.getElementById('btn-generate').addEventListener('mousedown', async () => {
        const api_key = document.getElementById('api-key').value;
        let error_message = document.getElementById('error-message');

        if (!api_key) {
            error_message.textContent = 'Please enter an API key.';
            error_message.hidden = false;
            return;
        }
        error_message.hidden = true;
        sessionStorage.apiKey = api_key;

        document.documentElement.classList.add('wait-cursor');
        document.getElementById('prompt-form').hidden = true;
        document.getElementById('loading-message').hidden = false;

        const prompt = document.getElementById('prompt').value;
        try {
            const generated_form = await generate_form_json(api_key, prompt);
            console.log(generated_form);
            sessionStorage.formObject = JSON.stringify(generated_form);
            clearForm();
            editForm(generated_form);

            setVisibility('builder');
        }
        catch (err) {
            let error_message = document.getElementById('error-message');
            error_message.textContent = err.message;
            error_message.hidden = false;
            console.log(err);
        }
        finally {
            document.documentElement.classList.remove('wait-cursor');
            document.getElementById('prompt-form').hidden = false;
            document.getElementById('loading-message').hidden = true;
        }
    });
    document.getElementById('btn-back-from-generate').addEventListener('mousedown', () => setVisibility('intro'));
    document.getElementById('btn-back-from-build').addEventListener('mousedown', () => setVisibility('intro'));
    document.getElementById('btn-clear').addEventListener('click', () => {
        sessionStorage.clear();
        clearForm();
    });

    builder.build(forms.header, 'builder-header');
    const createElementCreator = (tagName) => (a, ...b) => builder.element(tagName, a, ...b);

    const div = createElementCreator('div');
    const summary = createElementCreator('summary');
    const details = createElementCreator('details');
    const span = createElementCreator('span');
    const button = createElementCreator('button');

    function addField() {
        let field_grip = div({ draggable: true, class: 'draggable', style: 'display:inline' }, '⣿⣿');
        let field_summary = summary({},
            span({id: `field_id_${field_index}`}, `Field ${field_index}`),
            div({class: 'builder-details-buttons'},
                field_grip,
                button({id: `remove_field_${field_index}`, type: 'button'}, '🗑️'),
            ));
        let field_form = details({ id: `field_${field_index}` },
            field_summary,
            div({id: `field_start_${field_index}`, class: 'builder-field-start'}),
            div({id: `field_type_${field_index}`}));

        const index_copy = field_index;
        field_grip.addEventListener('dragstart', e => {
            // setTimeout is necessary to work around Chrome bug where dragend
            // event triggers immediately if DOM is changed in dragstart handler
            setTimeout(() => document.body.classList.add('dragging'), 0);
            e.dataTransfer.setData('text/plain', index_copy);
        });
        field_grip.addEventListener('dragend', e => document.body.classList.remove('dragging'));
        field_summary.addEventListener('dragenter', e => field_summary.classList.add('dragging-over'));
        field_summary.addEventListener('dragleave', e => field_summary.classList.remove('dragging-over'));
        field_summary.addEventListener('dragover', e => e.preventDefault());
        field_summary.addEventListener('drop', e => {
            e.preventDefault();
            e.target.classList.remove('dragging-over');
            let result = Number(e.dataTransfer.getData('text/plain'));
            if (result === index_copy) return;
            field_form.after(
                document.getElementById(`field_${result}`));
        });

        document.getElementById('builder-fields').appendChild(field_form);
        builder.build(forms.field_start, `field_start_${field_index}`);

        const current_field = document.getElementById(`field_${field_index}`);
        current_field.querySelector('#type').addEventListener('change',
            e => builder.build(forms[`field_type_${e.target.value}`], `field_type_${index_copy}`));

        current_field.querySelector('input#id').addEventListener('keyup', e =>
            document.getElementById(`field_id_${index_copy}`).innerText =
                e.target.value === '' ? `Field ${index_copy}` : e.target.value);

        const focusable = current_field.querySelectorAll('input, select, textarea');
        if (focusable.length > 0) {
            focusable[0].addEventListener('keydown', e => {
                if (e.shiftKey && e.key === 'Tab') {
                    e.preventDefault();
                    e.target.parentElement.parentElement.parentElement.previousElementSibling.focus();
                }
            });
        }

        current_field.addEventListener('keydown', e => {
            if (e.key !== 'Tab' || e.shiftKey) return;
            if (!e.target.matches('summary')) return;

            e.preventDefault();
            current_field.open = true;

            const previous = current_field.previousElementSibling;
            if (previous && previous.tagName.toLowerCase() === 'details')
                previous.open = false;

            const focusable = current_field.querySelectorAll('input, select, textarea');
            if (focusable.length > 0) focusable[0].focus();
        });

        document.getElementById(`remove_field_${field_index}`).addEventListener('click',
            () => document.getElementById(`field_${index_copy}`).remove());

        return `field_${field_index++}`;
    }

    const placeholder = document.getElementById('placeholder');
    placeholder.addEventListener('dragenter', e => placeholder.classList.add('dragging-over'));
    placeholder.addEventListener('dragleave', e => placeholder.classList.remove('dragging-over'));
    placeholder.addEventListener('dragover', e => e.preventDefault());
    placeholder.addEventListener('drop', e => {
        e.preventDefault();
        e.target.classList.remove('dragging-over');
        let result = Number(e.dataTransfer.getData('text/plain'));
        placeholder.after(
            document.getElementById(`field_${result}`));
    });
    document.getElementById('add_field').addEventListener('mousedown', addField);

    document.getElementById('toggle_sections').addEventListener('mousedown', () => {
        const details = document.querySelectorAll('#builder-fields details');
        const anyOpen = Array.from(details).some(d => d.open);
        details.forEach(d => d.open = !anyOpen);
    });

    document.getElementById('btn-download').addEventListener('mousedown', () => {
        const form = document.getElementById(formObject.id);

        form.querySelectorAll('[required]').forEach(el => {
            if (!el.checkValidity()) {
                const d = el.closest('details');
                if (d) d.open = true;
            }
        });

        const ids = Array.from(form.querySelectorAll('#id')).map(e => e.value);
        if (ids.some((id, i) => id && ids.indexOf(id) !== i)) return;

        const isValid = form.reportValidity();
        if (!isValid) return;

        let formData = builder.getFormData('builder-header');
        formData.fields = Array.from(
            { length: ids.length - 1 },
            (_, i) => builder.getFormData(`field_${i}`)
        );

        const json = JSON.stringify(formData);

        let dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(json);
        let downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute('href', dataStr);
        downloadAnchorNode.setAttribute('download', `${formData.id}.json`);
        document.body.appendChild(downloadAnchorNode); // required for firefox
        downloadAnchorNode.click();
    });

    document.getElementById('btn-preview').addEventListener('mousedown', e => {
        const form = document.getElementById(formObject.id);

        form.querySelectorAll('[required]').forEach(el => {
            if (!el.checkValidity()) {
                const d = el.closest('details');
                if (d) d.open = true;
            }
        });

        const ids = Array.from(form.querySelectorAll('#id')).map(e => e.value);
        if (ids.some((id, i) => id && ids.indexOf(id) !== i)) return;

        const isValid = form.reportValidity();
        if (!isValid) return;

        let formData = builder.getFormData('builder-header');

        let fieldsElement = document.getElementById('builder-fields');
        formData.fields = Array.from(
            fieldsElement.querySelectorAll('details[id^="field_"]'),
            x => builder.getFormData(x.id));

        sessionStorage.formObject = JSON.stringify(formData);
        window.location = '/form.html?preview=true';
    });

    document.title = formObject.title;
    document.getElementById('builder-title').innerText = formObject.title;

    if (sessionStorage.apiKey) {
        document.getElementById('api-key').value = sessionStorage.apiKey;
    }
    try {
        editForm(JSON.parse(sessionStorage.formObject));
    }
    catch {}
</script>

</html>
